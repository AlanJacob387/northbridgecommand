<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian — Dashboard</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #080808; color: #F5F0E8; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; font-size: 14px; line-height: 1.5; overflow: hidden; }

::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: #111; }
::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 2px; }

:root {
  --black:      #080808;
  --black-soft: #0e0e0e;
  --black-card: #141414;
  --black-mid:  #1a1a1a;
  --border:     rgba(201,168,76,0.18);
  --border-str: rgba(201,168,76,0.38);
  --gold:       #C9A84C;
  --gold-dim:   #8B6914;
  --gold-sub:   rgba(201,168,76,0.08);
  --white:      #F5F0E8;
  --white-dim:  #A89880;
  --white-muted:#6B5F50;
  --occ:        #ef4444;
  --occ-bg:     rgba(239,68,68,0.12);
  --occ-border: rgba(239,68,68,0.35);
  --vac:        #22c55e;
  --vac-bg:     rgba(34,197,94,0.1);
  --vac-border: rgba(34,197,94,0.3);
}

/* LOGIN */
#loginScreen {
  height: 100vh; display: flex; align-items: center; justify-content: center;
  background: #080808;
  background-image:
    repeating-linear-gradient(90deg, transparent, transparent 79px, rgba(201,168,76,0.03) 79px, rgba(201,168,76,0.03) 80px),
    repeating-linear-gradient(0deg, transparent, transparent 79px, rgba(201,168,76,0.03) 79px, rgba(201,168,76,0.03) 80px);
}
.login-box { width: 380px; border: 1px solid var(--border); background: var(--black-card); }
.login-head { padding: 32px 36px 24px; border-bottom: 1px solid var(--border); background: var(--black-soft); }
.login-product { font-size: 1.4rem; font-weight: 700; letter-spacing: 0.1em; color: var(--gold); font-family: Georgia, serif; margin-bottom: 4px; }
.login-company { font-size: 0.62rem; letter-spacing: 0.28em; text-transform: uppercase; color: var(--white-muted); font-family: monospace; }
.login-body { padding: 28px 36px 32px; }
.login-field { margin-bottom: 14px; }
.login-field label { display: block; font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--white-muted); font-family: monospace; margin-bottom: 7px; }
.login-field input { width: 100%; background: var(--black-soft); border: 1px solid var(--border); color: var(--white); font-size: 0.875rem; padding: 10px 14px; outline: none; border-radius: 0; transition: border-color 0.2s; -webkit-appearance: none; }
.login-field input:focus { border-color: var(--gold); }
.login-field input::placeholder { color: var(--white-muted); opacity: 0.5; }
.login-btn { width: 100%; background: var(--gold); border: none; color: #080808; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; padding: 13px; cursor: pointer; margin-top: 6px; transition: background 0.2s; }
.login-btn:hover { background: #E8CC82; }
.login-btn:disabled { opacity: 0.6; cursor: default; }
.login-error { font-size: 0.7rem; color: var(--occ); margin-top: 10px; text-align: center; min-height: 18px; font-family: monospace; letter-spacing: 0.08em; }

/* DASHBOARD */
#dashScreen { display: none; height: 100vh; flex-direction: column; overflow: hidden; }

.topbar { height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--black-soft); flex-shrink: 0; }
.topbar-left { display: flex; align-items: center; gap: 20px; }
.topbar-logo { font-family: Georgia, serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; color: var(--gold); }
.topbar-divider { width: 1px; height: 20px; background: var(--border); }
.topbar-hotel { font-size: 0.78rem; font-weight: 500; color: var(--white); letter-spacing: 0.02em; }
.topbar-right { display: flex; align-items: center; gap: 20px; }
.live-badge { display: flex; align-items: center; gap: 7px; font-family: monospace; font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--vac); }
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--vac); animation: livepulse 1.5s ease-in-out infinite; }
@keyframes livepulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.75)} }
.last-updated { font-family: monospace; font-size: 0.6rem; letter-spacing: 0.12em; color: var(--white-muted); }
.logout-btn { font-family: monospace; font-size: 0.6rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--white-muted); background: none; border: 1px solid var(--border); padding: 5px 12px; cursor: pointer; transition: color 0.2s, border-color 0.2s; }
.logout-btn:hover { color: var(--gold); border-color: var(--gold); }

.summary-bar { display: flex; align-items: center; gap: 0; padding: 0 24px; height: 44px; border-bottom: 1px solid var(--border); background: var(--black); flex-shrink: 0; }
.summary-item { display: flex; align-items: center; gap: 8px; padding: 0 20px 0 0; margin-right: 20px; border-right: 1px solid var(--border); }
.summary-item:last-child { border-right: none; }
.summary-label { font-family: monospace; font-size: 0.58rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--white-muted); }
.summary-val { font-size: 0.88rem; font-weight: 600; color: var(--white); font-variant-numeric: tabular-nums; }
.summary-val.occ { color: var(--occ); }
.summary-val.vac { color: var(--vac); }
.summary-val.rate { color: var(--gold); }

.floor-tabs { display: flex; gap: 0; padding: 0 24px; border-bottom: 1px solid var(--border); background: var(--black-soft); flex-shrink: 0; }
.floor-tab { font-family: monospace; font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--white-muted); padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; background: none; border-top: none; border-left: none; border-right: none; }
.floor-tab:hover { color: var(--white); }
.floor-tab.active { color: var(--gold); border-bottom-color: var(--gold); }

.dash-content { flex: 1; overflow-y: auto; padding: 20px 24px; background: var(--black); }

.corridor-wrap { max-width: 960px; }
.corridor-label { font-family: monospace; font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase; color: var(--white-muted); margin-bottom: 8px; padding-left: 2px; }
.corridor { display: grid; grid-template-columns: repeat(12, 1fr); gap: 6px; margin-bottom: 6px; }
.corridor-gap { height: 18px; display: flex; align-items: center; margin: 0 0 6px 0; }
.corridor-gap-line { flex: 1; height: 1px; background: rgba(201,168,76,0.08); }
.corridor-gap-text { font-family: monospace; font-size: 0.5rem; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(201,168,76,0.2); padding: 0 10px; }

.room-card { background: var(--black-card); border: 1px solid var(--border); padding: 8px 6px 7px; position: relative; transition: background 0.4s, border-color 0.4s; cursor: default; min-height: 64px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px; }
.room-card.occupied { background: var(--occ-bg); border-color: var(--occ-border); }
.room-card.vacant { background: var(--vac-bg); border-color: var(--vac-border); }
.room-card.live-sensor::after { content: 'LIVE'; position: absolute; top: 3px; right: 3px; font-family: monospace; font-size: 0.42rem; letter-spacing: 0.1em; color: var(--gold); background: var(--gold-sub); border: 1px solid rgba(201,168,76,0.3); padding: 1px 4px; line-height: 1.4; }
.room-num { font-family: monospace; font-size: 0.65rem; letter-spacing: 0.1em; color: var(--white-muted); }
.room-status { font-size: 0.62rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 4px; }
.room-card.occupied .room-status { color: var(--occ); }
.room-card.vacant .room-status { color: var(--vac); }
.status-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
.room-card.occupied .status-dot { background: var(--occ); animation: occpulse 2s ease-in-out infinite; }
.room-card.vacant .status-dot { background: var(--vac); opacity: 0.7; }
@keyframes occpulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.room-card.flipping { animation: flipcard 0.35s ease; }
@keyframes flipcard { 0%{opacity:1} 40%{opacity:0.2;transform:scaleY(0.85)} 100%{opacity:1;transform:scaleY(1)} }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-head">
      <div class="login-product">Meridian</div>
      <div class="login-company">by Northbridge Command</div>
    </div>
    <div class="login-body">
      <div class="login-field">
        <label for="emailIn">Email</label>
        <input type="email" id="emailIn" placeholder="your@hotel.com" autocomplete="username">
      </div>
      <div class="login-field">
        <label for="passIn">Password</label>
        <input type="password" id="passIn" placeholder="••••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" id="loginBtn" onclick="attemptLogin()">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>
</div>

<div id="dashScreen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-logo">Meridian</div>
      <div class="topbar-divider"></div>
      <div class="topbar-hotel" id="hotelName">Grand Suites Hotel</div>
    </div>
    <div class="topbar-right">
      <div class="last-updated" id="lastUpdated">Updated just now</div>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </div>
  <div class="summary-bar">
    <div class="summary-item"><span class="summary-label">Total Rooms</span><span class="summary-val" id="sumTotal">24</span></div>
    <div class="summary-item"><span class="summary-label">Occupied</span><span class="summary-val occ" id="sumOcc">—</span></div>
    <div class="summary-item"><span class="summary-label">Vacant</span><span class="summary-val vac" id="sumVac">—</span></div>
    <div class="summary-item"><span class="summary-label">Occupancy Rate</span><span class="summary-val rate" id="sumRate">—</span></div>
  </div>
  <div class="floor-tabs">
    <button class="floor-tab active" onclick="selectFloor(1, this)">Floor 1</button>
    <button class="floor-tab" onclick="selectFloor(2, this)">Floor 2</button>
    <button class="floor-tab" onclick="selectFloor(3, this)">Floor 3</button>
  </div>
  <div class="dash-content">
    <div class="corridor-wrap" id="corridorWrap"></div>
  </div>
</div>

<script>
// ── DEFAULT CONFIG (overridden by config.js) ──
var CONFIG = { ngrok_url: '', live_room: '318', poll_interval_ms: 2000 };
</script>
<script src="config.js"></script>
<script>
const CREDS = {
  'demo@grandsuiteshotel.com': { pass: 'meridian2026', hotel: 'Grand Suites Hotel' }
}

let currentFloor = 1
let roomStates   = {}
let simInterval  = null
let pollInterval = null
let clockInterval= null
let lastUpdate   = Date.now()

function getRoomsForFloor(floor) {
  const p = floor * 100
  return {
    top:    Array.from({length:12}, (_,i) => String(p + i + 1)),
    bottom: Array.from({length:12}, (_,i) => String(p + i + 13))
  }
}

function allRooms() {
  const all = []
  for (let f = 1; f <= 3; f++) {
    const { top, bottom } = getRoomsForFloor(f)
    all.push(...top, ...bottom)
  }
  return all
}

function initStates() {
  allRooms().forEach(r => { roomStates[r] = Math.random() < 0.62 })
}

// ── LOGIN ──
function attemptLogin() {
  const email = document.getElementById('emailIn').value.trim().toLowerCase()
  const pass  = document.getElementById('passIn').value
  const err   = document.getElementById('loginError')
  const btn   = document.getElementById('loginBtn')

  if (CREDS[email] && CREDS[email].pass === pass) {
    err.textContent = ''
    btn.disabled = true
    btn.textContent = 'Signing in...'
    document.getElementById('hotelName').textContent = CREDS[email].hotel
    sessionStorage.setItem('meridian_auth', JSON.stringify({ email, hotel: CREDS[email].hotel }))
    showDashboard()
  } else {
    err.textContent = 'Invalid credentials.'
    document.getElementById('passIn').value = ''
  }
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none'
  document.getElementById('dashScreen').style.display  = 'flex'
  initStates()
  renderFloor(currentFloor)
  startSimulation()
  startLivePolling()
  startClock()
}

document.getElementById('passIn').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin() })
document.getElementById('emailIn').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('passIn').focus() })

function logout() {
  stopAll()
  sessionStorage.removeItem('meridian_auth')
  document.getElementById('dashScreen').style.display  = 'none'
  document.getElementById('loginScreen').style.display = 'flex'
  document.getElementById('emailIn').value = ''
  document.getElementById('passIn').value  = ''
  document.getElementById('loginError').textContent = ''
  document.getElementById('loginBtn').disabled = false
  document.getElementById('loginBtn').textContent = 'Sign In'
  currentFloor = 1
  document.querySelectorAll('.floor-tab').forEach((t,i) => t.classList.toggle('active', i===0))
}

// ── RESTORE SESSION ──
;(function() {
  const saved = sessionStorage.getItem('meridian_auth')
  if (saved) {
    try {
      const { hotel } = JSON.parse(saved)
      document.getElementById('hotelName').textContent = hotel
      showDashboard()
    } catch(_) { sessionStorage.removeItem('meridian_auth') }
  }
})()

// ── FLOOR SELECT ──
function selectFloor(floor, btn) {
  currentFloor = floor
  document.querySelectorAll('.floor-tab').forEach(t => t.classList.remove('active'))
  btn.classList.add('active')
  renderFloor(floor)
}

// ── RENDER FLOOR ──
function renderFloor(floor) {
  const wrap = document.getElementById('corridorWrap')
  const { top, bottom } = getRoomsForFloor(floor)
  wrap.innerHTML = ''

  const topLabel = document.createElement('div')
  topLabel.className = 'corridor-label'
  topLabel.textContent = 'North Corridor'
  wrap.appendChild(topLabel)

  const topRow = document.createElement('div')
  topRow.className = 'corridor'
  top.forEach(r => topRow.appendChild(makeCard(r)))
  wrap.appendChild(topRow)

  const gap = document.createElement('div')
  gap.className = 'corridor-gap'
  gap.innerHTML = '<div class="corridor-gap-line"></div><div class="corridor-gap-text">Hallway</div><div class="corridor-gap-line"></div>'
  wrap.appendChild(gap)

  const botLabel = document.createElement('div')
  botLabel.className = 'corridor-label'
  botLabel.textContent = 'South Corridor'
  wrap.appendChild(botLabel)

  const botRow = document.createElement('div')
  botRow.className = 'corridor'
  bottom.forEach(r => botRow.appendChild(makeCard(r)))
  wrap.appendChild(botRow)

  updateSummary()
}

function makeCard(roomNum) {
  const occ    = roomStates[roomNum]
  const isLive = roomNum === String(CONFIG.live_room)
  const card   = document.createElement('div')
  card.className = 'room-card ' + (occ ? 'occupied' : 'vacant') + (isLive ? ' live-sensor' : '')
  card.id = 'room-' + roomNum

  const num = document.createElement('div')
  num.className = 'room-num'
  num.textContent = roomNum

  const status = document.createElement('div')
  status.className = 'room-status'
  const dot = document.createElement('div')
  dot.className = 'status-dot'
  const label = document.createElement('span')
  label.textContent = occ ? 'Occupied' : 'Vacant'
  status.appendChild(dot)
  status.appendChild(label)
  card.appendChild(num)
  card.appendChild(status)
  return card
}

function updateRoom(roomNum, occupied) {
  if (roomStates[roomNum] === occupied) return
  roomStates[roomNum] = occupied
  const card = document.getElementById('room-' + roomNum)
  if (!card) return
  card.classList.add('flipping')
  setTimeout(() => {
    card.classList.remove('occupied', 'vacant')
    card.classList.add(occupied ? 'occupied' : 'vacant')
    card.querySelector('.room-status span').textContent = occupied ? 'Occupied' : 'Vacant'
    card.classList.remove('flipping')
    updateSummary()
  }, 175)
}

function updateSummary() {
  const { top, bottom } = getRoomsForFloor(currentFloor)
  const rooms = [...top, ...bottom]
  const occ   = rooms.filter(r => roomStates[r]).length
  const vac   = rooms.length - occ
  document.getElementById('sumTotal').textContent = rooms.length
  document.getElementById('sumOcc').textContent   = occ
  document.getElementById('sumVac').textContent   = vac
  document.getElementById('sumRate').textContent  = Math.round((occ/rooms.length)*100) + '%'
}

// ── SIMULATION ──
function startSimulation() {
  simInterval = setInterval(() => {
    const rooms = allRooms()
    const count = Math.floor(Math.random() * 3) + 1
    for (let i = 0; i < count; i++) {
      const r = rooms[Math.floor(Math.random() * rooms.length)]
      if (String(r) === String(CONFIG.live_room)) continue
      updateRoom(r, !roomStates[r])
    }
    bumpClock()
  }, 15000 + Math.random() * 10000)
}

// ── LIVE POLLING — with ngrok-skip-browser-warning header ──
function startLivePolling() {
  if (!CONFIG.ngrok_url) return
  const interval = CONFIG.poll_interval_ms || 2000
  pollInterval = setInterval(async () => {
    try {
      const res = await fetch(CONFIG.ngrok_url + '/status', {
        signal: AbortSignal.timeout(3000),
        headers: { 'ngrok-skip-browser-warning': '1' }
      })
      if (!res.ok) return
      const data = await res.json()
      if (data && typeof data.occupied === 'boolean' && data.room) {
        updateRoom(String(data.room), data.occupied)
        bumpClock()
      }
    } catch (_) {
      // silently fall back to demo mode
    }
  }, interval)
}

// ── CLOCK ──
function bumpClock() {
  lastUpdate = Date.now()
  document.getElementById('lastUpdated').textContent = 'Updated just now'
}
function startClock() {
  clockInterval = setInterval(() => {
    const secs = Math.floor((Date.now() - lastUpdate) / 1000)
    const el   = document.getElementById('lastUpdated')
    if (secs < 10)      el.textContent = 'Updated just now'
    else if (secs < 60) el.textContent = `Updated ${secs}s ago`
    else                el.textContent = `Updated ${Math.floor(secs/60)}m ago`
  }, 5000)
}

function stopAll() {
  if (simInterval)   { clearInterval(simInterval);   simInterval   = null }
  if (pollInterval)  { clearInterval(pollInterval);  pollInterval  = null }
  if (clockInterval) { clearInterval(clockInterval); clockInterval = null }
}
</script>
</body>
</html>
