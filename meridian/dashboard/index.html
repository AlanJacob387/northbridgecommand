<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian — Dashboard</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#080808;color:#F5F0E8;font-family:'SF Mono','Fira Mono','Consolas','Menlo',monospace;font-size:13px;line-height:1.5;overflow:hidden;}
::-webkit-scrollbar{width:3px;height:3px;}
::-webkit-scrollbar-track{background:#0e0e0e;}
::-webkit-scrollbar-thumb{background:#2a2010;}
:root{
  --black:#080808;
  --s1:#0e0e0e;
  --s2:#141414;
  --s3:#1a1a1a;
  --gold:#C9A84C;
  --gold-dim:rgba(201,168,76,0.18);
  --gold-line:rgba(201,168,76,0.22);
  --gold-line-str:rgba(201,168,76,0.42);
  --white:#F5F0E8;
  --muted:#6B5F50;
  --dim:#A89880;
  --occ:#e67e22;
  --occ-bg:rgba(230,126,34,0.1);
  --occ-line:rgba(230,126,34,0.32);
  --vac:#27ae60;
  --vac-bg:rgba(39,174,96,0.08);
  --vac-line:rgba(39,174,96,0.25);
}

/* ── LOGIN ── */
#L{
  height:100vh;display:flex;align-items:center;justify-content:center;
  background-image:repeating-linear-gradient(
    0deg,transparent,transparent 39px,rgba(201,168,76,0.025) 39px,rgba(201,168,76,0.025) 40px
  ),repeating-linear-gradient(
    90deg,transparent,transparent 39px,rgba(201,168,76,0.025) 39px,rgba(201,168,76,0.025) 40px
  );
}
.lbox{width:360px;border:1px solid var(--gold-line-str);background:var(--s2);}
.lhead{padding:28px 32px 22px;border-bottom:1px solid var(--gold-line);background:var(--s1);}
.lprod{font-family:Georgia,serif;font-size:1.5rem;font-weight:700;letter-spacing:0.08em;color:var(--gold);line-height:1;}
.lco{font-size:0.58rem;letter-spacing:0.28em;text-transform:uppercase;color:var(--muted);margin-top:5px;}
.lbody{padding:24px 32px 28px;}
.lf{margin-bottom:12px;}
.lf label{display:block;font-size:0.58rem;letter-spacing:0.22em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
.lf input{
  width:100%;background:var(--s1);border:1px solid var(--gold-line);color:var(--white);
  font-family:inherit;font-size:0.82rem;padding:9px 12px;outline:none;
  transition:border-color 0.18s;
}
.lf input:focus{border-color:var(--gold);}
.lf input::placeholder{color:var(--muted);opacity:0.6;}
.lbtn{
  width:100%;background:var(--gold);border:none;color:#080808;
  font-family:inherit;font-size:0.68rem;font-weight:700;letter-spacing:0.2em;
  text-transform:uppercase;padding:12px;cursor:pointer;margin-top:4px;
  transition:background 0.18s;
}
.lbtn:hover{background:#E8CC82;}
.lbtn:disabled{opacity:0.6;cursor:default;}
.lerr{font-size:0.65rem;color:var(--occ);margin-top:9px;text-align:center;min-height:16px;letter-spacing:0.06em;}

/* ── DASHBOARD ── */
#D{display:none;height:100vh;flex-direction:column;overflow:hidden;}

.tb{
  height:48px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;border-bottom:1px solid var(--gold-line);background:var(--s1);flex-shrink:0;
}
.tb-l{display:flex;align-items:center;gap:16px;}
.tb-logo{font-family:Georgia,serif;font-size:1.05rem;font-weight:700;letter-spacing:0.1em;color:var(--gold);}
.tb-sep{width:1px;height:16px;background:var(--gold-line);}
.tb-hotel{font-size:0.72rem;color:var(--dim);letter-spacing:0.06em;}
.tb-r{display:flex;align-items:center;gap:16px;}
.live-badge{display:flex;align-items:center;gap:6px;font-size:0.58rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--vac);}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--vac);animation:lp 1.6s ease-in-out infinite;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:0.3}}
.tb-time{font-size:0.6rem;letter-spacing:0.1em;color:var(--muted);}
.tb-out{
  font-size:0.58rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);
  background:none;border:1px solid var(--gold-line);padding:4px 10px;cursor:pointer;
  transition:color 0.18s,border-color 0.18s;
}
.tb-out:hover{color:var(--gold);border-color:var(--gold);}

.ctrl{
  height:38px;display:flex;align-items:stretch;
  border-bottom:1px solid var(--gold-line);background:var(--black);flex-shrink:0;
}
.stat{display:flex;align-items:center;gap:8px;padding:0 18px;border-right:1px solid var(--gold-line);}
.stat-lbl{font-size:0.56rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--muted);}
.stat-val{font-size:0.8rem;font-weight:700;color:var(--white);font-variant-numeric:tabular-nums;}
.stat-val.o{color:var(--occ);}
.stat-val.v{color:var(--vac);}
.stat-val.r{color:var(--gold);}
.floor-tabs{display:flex;margin-left:auto;}
.ftab{
  height:100%;padding:0 18px;font-family:inherit;font-size:0.6rem;letter-spacing:0.18em;
  text-transform:uppercase;color:var(--muted);background:none;border:none;
  border-left:1px solid var(--gold-line);border-bottom:2px solid transparent;
  cursor:pointer;transition:color 0.18s,border-color 0.18s;
}
.ftab:hover{color:var(--dim);}
.ftab.on{color:var(--gold);border-bottom-color:var(--gold);}

.main{flex:1;overflow-y:auto;padding:16px 20px;background:var(--black);}

.fp-wrap{max-width:1100px;}
.fp-corridor-label{font-size:0.52rem;letter-spacing:0.24em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;padding-left:1px;}
.fp-row{display:grid;grid-template-columns:repeat(12,1fr);gap:5px;margin-bottom:5px;}
.fp-hall{height:14px;display:flex;align-items:center;margin-bottom:5px;}
.fp-hall-line{flex:1;height:1px;background:rgba(201,168,76,0.06);}
.fp-hall-txt{font-size:0.48rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(201,168,76,0.18);padding:0 8px;}

.rc{
  background:var(--s2);border:1px solid rgba(201,168,76,0.1);
  padding:6px 5px 5px;position:relative;
  transition:background 0.45s,border-color 0.45s;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;min-height:56px;cursor:default;
}
.rc.occ{background:var(--occ-bg);border-color:var(--occ-line);}
.rc.vac{background:var(--vac-bg);border-color:var(--vac-line);}
.rc.live{border-left:2px solid var(--gold);}
.rc-num{font-size:0.58rem;letter-spacing:0.08em;color:var(--muted);}
.rc-status{font-size:0.55rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;display:flex;align-items:center;gap:3px;}
.rc.occ .rc-status{color:var(--occ);}
.rc.vac .rc-status{color:var(--vac);}
.rc-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.rc.occ .rc-dot{background:var(--occ);animation:op 2.2s ease-in-out infinite;}
.rc.vac .rc-dot{background:var(--vac);opacity:0.65;}
@keyframes op{0%,100%{opacity:1}50%{opacity:0.3}}
.rc.live-tag::after{
  content:'LIVE';position:absolute;top:2px;right:3px;
  font-size:0.4rem;letter-spacing:0.1em;color:var(--gold);
  background:rgba(201,168,76,0.08);border:1px solid rgba(201,168,76,0.25);
  padding:1px 3px;line-height:1.4;
}
.rc.flip{animation:fp 0.3s ease;}
@keyframes fp{0%{opacity:1}45%{opacity:0;transform:scaleY(0.8)}100%{opacity:1;transform:scaleY(1)}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="L">
  <div class="lbox">
    <div class="lhead">
      <div class="lprod">Meridian</div>
      <div class="lco">by Northbridge Command</div>
    </div>
    <div class="lbody">
      <div class="lf"><label>Email</label><input type="email" id="ei" placeholder="your@hotel.com" autocomplete="username"></div>
      <div class="lf"><label>Password</label><input type="password" id="pi" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="lbtn" id="lb" onclick="login()">Sign in</button>
      <div class="lerr" id="le"></div>
    </div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="D">
  <div class="tb">
    <div class="tb-l">
      <div class="tb-logo">Meridian</div>
      <div class="tb-sep"></div>
      <div class="tb-hotel" id="hn">Grand Suites Hotel</div>
    </div>
    <div class="tb-r">
      <div class="tb-time" id="tu">Updated just now</div>
      <div class="live-badge"><div class="live-dot"></div>Live</div>
      <button class="tb-out" onclick="logout()">Sign out</button>
    </div>
  </div>
  <div class="ctrl">
    <div class="stat"><span class="stat-lbl">Rooms</span><span class="stat-val" id="sT">24</span></div>
    <div class="stat"><span class="stat-lbl">Occupied</span><span class="stat-val o" id="sO">—</span></div>
    <div class="stat"><span class="stat-lbl">Vacant</span><span class="stat-val v" id="sV">—</span></div>
    <div class="stat"><span class="stat-lbl">Rate</span><span class="stat-val r" id="sR">—</span></div>
    <div class="floor-tabs">
      <button class="ftab on" onclick="sf(1,this)">Floor 1</button>
      <button class="ftab" onclick="sf(2,this)">Floor 2</button>
      <button class="ftab" onclick="sf(3,this)">Floor 3</button>
    </div>
  </div>
  <div class="main">
    <div class="fp-wrap" id="fp"></div>
  </div>
</div>

<script>
const CREDS={'demo@grandsuiteshotel.com':{p:'meridian2026',h:'Grand Suites Hotel'}}
const LIVE_ROOM='318'
const POLL_MS=2000
const NGROK_URL='https://shrug-clarity-clicker.ngrok-free.dev'
let cf=1,rs={},sim=null,poll=null,clk=null,lu=Date.now()

function rooms(f){
  const n=f*100
  return{
    top:Array.from({length:12},(_,i)=>String(n+i+1)),
    bot:Array.from({length:12},(_,i)=>String(n+i+13))
  }
}
function allR(){const a=[];for(let f=1;f<=3;f++){const{top,bot}=rooms(f);a.push(...top,...bot)}return a}
function initS(){allR().forEach(r=>{rs[r]=Math.random()<0.62})}

async function startPoll(){
  if(!NGROK_URL)return
  poll=setInterval(async()=>{
    try{
      const res=await fetch(NGROK_URL+'/status',{
        signal:AbortSignal.timeout(3000),
        headers:{'ngrok-skip-browser-warning':'1'}
      })
      if(!res.ok)return
      const d=await res.json()
      if(d&&typeof d.occupied==='boolean'&&d.room){upd(String(d.room),d.occupied);bump()}
    }catch{}
  },POLL_MS)
}

function login(){
  const e=document.getElementById('ei').value.trim().toLowerCase()
  const p=document.getElementById('pi').value
  const er=document.getElementById('le')
  const btn=document.getElementById('lb')
  if(CREDS[e]&&CREDS[e].p===p){
    er.textContent=''
    btn.disabled=true
    btn.textContent='Signing in...'
    document.getElementById('hn').textContent=CREDS[e].h
    sessionStorage.setItem('ma',JSON.stringify({e,h:CREDS[e].h}))
    showDash()
  }else{er.textContent='Invalid credentials.';document.getElementById('pi').value=''}
}

function showDash(){
  document.getElementById('L').style.display='none'
  document.getElementById('D').style.display='flex'
  initS();render(cf);startSim();startPoll();startClk()
}

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('pi').addEventListener('keydown',e=>{if(e.key==='Enter')login()})
  document.getElementById('ei').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('pi').focus()})
  // restore session
  const saved=sessionStorage.getItem('ma')
  if(saved){
    try{
      const{h}=JSON.parse(saved)
      document.getElementById('hn').textContent=h
      showDash()
    }catch{sessionStorage.removeItem('ma')}
  }
})

function logout(){
  stopAll()
  sessionStorage.removeItem('ma')
  document.getElementById('D').style.display='none'
  document.getElementById('L').style.display='flex'
  document.getElementById('ei').value=''
  document.getElementById('pi').value=''
  document.getElementById('le').textContent=''
  document.getElementById('lb').disabled=false
  document.getElementById('lb').textContent='Sign in'
  cf=1;document.querySelectorAll('.ftab').forEach((t,i)=>t.classList.toggle('on',i===0))
}

function sf(f,btn){
  cf=f
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on'))
  btn.classList.add('on')
  render(f)
}

function render(f){
  const wrap=document.getElementById('fp')
  const{top,bot}=rooms(f)
  wrap.innerHTML=''
  const tl=document.createElement('div');tl.className='fp-corridor-label';tl.textContent='North corridor';wrap.appendChild(tl)
  const tr=document.createElement('div');tr.className='fp-row';top.forEach(r=>tr.appendChild(mkCard(r)));wrap.appendChild(tr)
  const hall=document.createElement('div');hall.className='fp-hall'
  hall.innerHTML='<div class="fp-hall-line"></div><div class="fp-hall-txt">Hallway</div><div class="fp-hall-line"></div>'
  wrap.appendChild(hall)
  const bl=document.createElement('div');bl.className='fp-corridor-label';bl.textContent='South corridor';wrap.appendChild(bl)
  const br=document.createElement('div');br.className='fp-row';bot.forEach(r=>br.appendChild(mkCard(r)));wrap.appendChild(br)
  updSum()
}

function mkCard(r){
  const o=rs[r]
  const isLive=r===LIVE_ROOM
  const c=document.createElement('div')
  c.className='rc '+(o?'occ':'vac')+(isLive?' live live-tag':'')
  c.id='r-'+r
  c.innerHTML=`<div class="rc-num">${r}</div><div class="rc-status"><div class="rc-dot"></div><span>${o?'Occ':'Vac'}</span></div>`
  return c
}

function upd(r,o){
  if(rs[r]===o)return
  rs[r]=o
  const c=document.getElementById('r-'+r)
  if(!c)return
  c.classList.add('flip')
  setTimeout(()=>{
    c.classList.remove('occ','vac','flip')
    c.classList.add(o?'occ':'vac')
    c.querySelector('.rc-status span').textContent=o?'Occ':'Vac'
    updSum()
  },150)
}

function updSum(){
  const{top,bot}=rooms(cf)
  const all=[...top,...bot]
  const o=all.filter(r=>rs[r]).length
  const v=all.length-o
  document.getElementById('sT').textContent=all.length
  document.getElementById('sO').textContent=o
  document.getElementById('sV').textContent=v
  document.getElementById('sR').textContent=Math.round((o/all.length)*100)+'%'
}

function bump(){lu=Date.now();document.getElementById('tu').textContent='Updated just now'}

function startSim(){
  sim=setInterval(()=>{
    const all=allR()
    const n=Math.floor(Math.random()*3)+1
    for(let i=0;i<n;i++){
      const r=all[Math.floor(Math.random()*all.length)]
      if(r===LIVE_ROOM)continue
      upd(r,!rs[r])
    }
    bump()
  },15000+Math.random()*10000)
}



function startClk(){
  clk=setInterval(()=>{
    const s=Math.floor((Date.now()-lu)/1000)
    const el=document.getElementById('tu')
    if(s<10)el.textContent='Updated just now'
    else if(s<60)el.textContent=`Updated ${s}s ago`
    else el.textContent=`Updated ${Math.floor(s/60)}m ago`
  },5000)
}

function stopAll(){
  if(sim){clearInterval(sim);sim=null}
  if(poll){clearInterval(poll);poll=null}
  if(clk){clearInterval(clk);clk=null}
}
</script>
</body>
</html>
